# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

name: Upload Python Package

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest
    # Only run if CI succeeded AND it was a release event.
    # Added head_repository check for security.
    if: |
      github.event_name == 'workflow_run' && 
      github.event.workflow_run.conclusion == 'success' && 
      github.event.workflow_run.event == 'release' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build release distributions
        run: uv build --wheel --sdist

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    environment:
      name: pypi
      url: https://pypi.org/project/PyStormTracker/${{ steps.get_version.outputs.version }}

    steps:
      - name: Get version from tag
        id: get_version
        run: |
          # Strips 'v' prefix from tag_name (e.g. v0.2.1 -> 0.2.1)
          # In workflow_run for a release, head_branch contains the tag name.
          VERSION=${{ github.event.workflow_run.head_branch }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
