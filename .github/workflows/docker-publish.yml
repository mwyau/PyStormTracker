name: Docker Publish

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_HUB_REPO: docker.io/xddd/pystormtracker
  GHCR_REPO: ghcr.io/xddd/pystormtracker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKER_HUB_REPO }}
            ${{ env.GHCR_REPO }}
          tags: |
            # Always tag with short SHA
            type=sha,format=short,prefix=
            # Tag with 'latest' only for releases
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            # Tag with 'dev' only for main branch
            type=raw,value=dev,enable=${{ github.ref_name == 'main' }}
            # Branch tag only for manual builds (non-main)
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
            # Semver tags only for releases
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' }}


      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation (Docker Hub)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.DOCKER_HUB_REPO }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation (GHCR)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.GHCR_REPO }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          artifact-name: sbom.spdx.json
          output-file: sbom.spdx.json
          output-format: spdx-json

      - name: Attest SBOM (Docker Hub)
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.DOCKER_HUB_REPO }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: 'sbom.spdx.json'
          push-to-registry: true

      - name: Attest SBOM (GHCR)
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.GHCR_REPO }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: 'sbom.spdx.json'
          push-to-registry: false
