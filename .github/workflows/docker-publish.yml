name: Docker Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'The branch, tag, or SHA to build from'
        required: true
        type: string
        default: 'main'

env:
  DOCKER_HUB_REPO: xddd/pystormtracker
  GHCR_REPO: ghcr.io/xddd/pystormtracker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Priority: Manual input -> current workflow ref
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKER_HUB_REPO }}
            ${{ env.GHCR_REPO }}
          tags: |
            # 1. Always tag with short SHA (no prefix)
            type=sha,prefix=,format=short
            # 2. Tag with 'latest' for any release or manual build of main
            type=raw,value=latest,enable=${{ github.event_name == 'release' || github.event.inputs.ref == 'main' || github.ref_name == 'main' }}
            # 3. Semantic Versioning for tags (v0.3.2 -> 0.3.2, 0.3, 0)
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' }}
            # 4. Tag with branch name for manual builds of non-main branches
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != 'main' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation (Docker Hub)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.DOCKER_HUB_REPO }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation (GHCR)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.GHCR_REPO }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
