name: Docker Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
      - 'v[0-9]*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: ${{ !(github.event.workflow_run.event == 'release' || github.ref_type == 'tag') }}

env:
  # Publish to ORG on release or dispatch from tag, else to OWNER (personal) for merge to main/manual
  DOCKER_HUB_REPO: docker.io/${{ ((github.event_name == 'workflow_run' && github.event.workflow_run.event == 'release') || (github.event_name == 'workflow_dispatch' && github.ref_type == 'tag')) && vars.DOCKER_ORG_NAME || github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}
  GHCR_REPO: ghcr.io/${{ ((github.event_name == 'workflow_run' && github.event.workflow_run.event == 'release') || (github.event_name == 'workflow_dispatch' && github.ref_type == 'tag')) && vars.DOCKER_ORG_NAME || github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}

jobs:
  build-and-push:
    name: build-and-push (${{ matrix.platform }})
    strategy:
      matrix:
        platform: [amd64, arm64]
    runs-on: ${{ matrix.platform == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    # Only run if CI succeeded (for workflow_run) or if it's a manual trigger.
    # Exclude PR events to avoid double triggers/publishing.
    if: |
      (github.event_name == 'workflow_run' && 
       github.event.workflow_run.conclusion == 'success' && 
       github.event.workflow_run.event != 'pull_request' &&
       github.event.workflow_run.head_repository.full_name == github.repository) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push native image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.platform }}
          tags: |
            ${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}-${{ matrix.platform }}
            ${{ env.GHCR_REPO }}:${{ github.sha }}-${{ matrix.platform }}
          cache-from: type=gha,scope=docker-build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=docker-build-${{ matrix.platform }}

  create-manifest:
    name: create-manifest
    needs: [build-and-push]
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKER_HUB_REPO }}
            ${{ env.GHCR_REPO }}
          # Fix: Tell the metadata action the real ref, otherwise it defaults to 'main'
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}
          tags: |
            # Tag with 'latest' for main branch (used for personal repo/edge)
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'main' || github.ref == 'refs/heads/main' }},priority=1000
            # Tag with 'edge' only for main branch builds
            type=edge,branch=main,priority=900
            # Semver tags for releases (includes 'latest')
            type=semver,pattern=latest,priority=1000
            type=semver,pattern={{version}},priority=800
            type=semver,pattern={{major}}.{{minor}},priority=700
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref_name, 'v0') }},priority=700
            # Branch tag for all branches except main
            type=ref,event=branch,enable=${{ github.ref_name != 'main' }},priority=600
            # Always tag with short SHA
            type=sha,format=short,prefix=,priority=100

      - name: Create and push multi-arch manifest
        id: manifest
        run: |
          # Create manifests for each final tag
          for tag in ${{ steps.meta.outputs.tags }}; do
            # Determine which repo this tag belongs to
            if [[ $tag == ghcr.io* ]]; then
              REPO_PREFIX="${{ env.GHCR_REPO }}"
            else
              REPO_PREFIX="${{ env.DOCKER_HUB_REPO }}"
            fi
            
            echo "Creating manifest for $tag using sources from $REPO_PREFIX"
            docker buildx imagetools create -t "$tag" \
              "${REPO_PREFIX}:${{ github.sha }}-amd64" \
              "${REPO_PREFIX}:${{ github.sha }}-arm64"
          done

          # Output digest of the final multi-arch manifest for attestations
          # (All tags point to the same manifest content)
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          DIGEST=$(docker buildx imagetools inspect "$FIRST_TAG" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest Provenance (Docker Hub)
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.DOCKER_HUB_REPO }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          artifact-name: sbom.cyclonedx.json
          output-file: sbom.cyclonedx.json
          format: cyclonedx-json

      - name: Attest SBOM (Docker Hub)
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.DOCKER_HUB_REPO }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          sbom-path: 'sbom.cyclonedx.json'
          push-to-registry: true
