name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
      - 'docs/**'
      - 'README.md'
  push:
    branches:
      - main
      - release/**
      - 'v*.*'
    tags:
      - 'v*.*'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

jobs:
  ruff-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3

  ruff-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  mypy-typecheck:
    runs-on: ubuntu-24.04
    env:
      CFLAGS: "-O3 -march=x86-64"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev libfftw3-dev
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Type check with Mypy
        run: uv run mypy src/ tests/

  unit-tests:
    name: unit-tests (Python ${{ matrix.python-version }}${{ matrix.min-deps && ', min-deps' || '' }})
    runs-on: ubuntu-24.04
    env:
      CFLAGS: "-O3 -march=x86-64"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        min-deps: [false]
        include:
          - python-version: "3.11"
            min-deps: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev libfftw3-dev
      - name: Install dependencies
        if: ${{ !matrix.min-deps }}
        run: uv sync --frozen --group dev
      - name: Install dependencies (min-deps)
        if: ${{ matrix.min-deps }}
        run: uv sync --group dev --resolution lowest-direct
      - name: Run Unit Tests
        if: matrix.python-version != '3.13' || matrix.min-deps
        run: uv run pytest -vv

      - name: Run Unit Tests with Coverage
        if: matrix.python-version == '3.13' && !matrix.min-deps
        run: uv run pytest -vv --cov=pystormtracker --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.13' && !matrix.min-deps
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: integration-tests (Python ${{ matrix.python-version }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        python-version: ["3.13"]
        include:
          - arch: amd64
            os: ubuntu-24.04
            cflags: "-O3 -march=x86-64"
          - arch: arm64
            os: ubuntu-24.04-arm
            cflags: "-O3"
    env:
      CFLAGS: ${{ matrix.cflags }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y openmpi-bin libopenmpi-dev libfftw3-dev
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run Integration Tests
        if: matrix.python-version != '3.13'
        run: uv run pytest -vv tests/test_integration_*.py --run-integration

      - name: Run Integration Tests with Coverage
        if: matrix.python-version == '3.13'
        run: uv run pytest -vv --cov=pystormtracker --cov-report=term-missing --cov-report=xml tests/test_integration_*.py --run-integration

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  docs-build:
    name: docs-build
    needs: [ruff-lint, ruff-format]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Build documentation
        run: uv run --extra docs --no-dev sphinx-build -b html docs docs/_build/html

  docker-build:
    name: docker-build
    needs: [ruff-lint, ruff-format, mypy-typecheck, unit-tests, integration-tests]
    # Only run on merges to main, release branches, tags, or manual dispatch
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/heads/release/') ||
       startsWith(github.ref, 'refs/tags/v') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
          ref: ${{ github.sha }}

      - name: Build and load image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,mode=max,scope=docker-build

      - name: Build ARM64 (cache only)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/arm64
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,mode=max,scope=docker-build

      - name: Smoke test image
        run: |
          # Test CLI help
          docker run --rm ${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }} --help
          # Test library import
          docker run --rm --entrypoint python ${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }} -c "import pystormtracker as pst; print('Import success')"

      - name: Vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  pypi-build:
    name: pypi-build
    needs: [ruff-lint, ruff-format, mypy-typecheck, unit-tests, integration-tests]
    # Only run on merges to main, release branches, tags, or manual dispatch
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/heads/release/') ||
       startsWith(github.ref, 'refs/tags/v') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build release distributions
        run: uv build --wheel --sdist
