name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
      - 'docs/**'
      - 'README.md'
  push:
    branches:
      - main
      - release/**
      - 'v*.*'
    tags:
      - 'v*.*'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

jobs:
  ruff-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3

  ruff-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  mypy-typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Type check with Mypy
        run: uv run mypy .

  unit-tests:
    name: unit-tests (Python ${{ matrix.python-version }}${{ matrix.min-deps && ', min-deps' || '' }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        min-deps: [false]
        include:
          - python-version: "3.11"
            min-deps: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: ${{ !matrix.min-deps }}
        run: uv sync --frozen --group dev
      - name: Install dependencies (min-deps)
        if: ${{ matrix.min-deps }}
        run: uv sync --group dev --resolution lowest-direct
      - name: Run Unit Tests
        if: matrix.python-version != '3.13' || matrix.min-deps
        run: uv run pytest -vv

      - name: Run Unit Tests with Coverage
        if: matrix.python-version == '3.13' && !matrix.min-deps
        run: uv run pytest -vv --cov=pystormtracker --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.13' && !matrix.min-deps
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: integration-tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-24.04
            python-version: '3.13'
          - arch: arm64
            os: ubuntu-24.04-arm
            python-version: '3.13'
          - arch: amd64
            os: windows-2025
            python-version: '3.13'
          - arch: arm64
            os: macos-26
            python-version: '3.13'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install MPI (Windows)
        if: runner.os == 'Windows'
        run: |
          winget install OpenMPI.OpenMPI --accept-source-agreements --accept-package-agreements
          "C:\Program Files\OpenMPI\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run Integration Tests
        if: matrix.os != 'ubuntu-24.04' || matrix.arch != 'amd64'
        run: uv run pytest -vv tests/integration/ --run-integration

      - name: Run Integration Tests with Coverage
        if: matrix.os == 'ubuntu-24.04' && matrix.arch == 'amd64'
        run: uv run pytest -vv --cov=pystormtracker --cov-report=term-missing --cov-report=xml tests/integration/ --run-integration

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-24.04' && matrix.arch == 'amd64'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  docs-build:
    name: docs-build
    needs: [ruff-lint, ruff-format]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.13'
      - name: Build documentation
        run: uv run --extra docs --no-dev sphinx-build -b html docs docs/_build/html

  docker-build:
    name: docker-build (${{ matrix.arch }})
    needs: [ruff-lint, ruff-format, mypy-typecheck, unit-tests, integration-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-24.04
          - arch: arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and load Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          platforms: linux/${{ matrix.arch }}
          tags: '${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}'
          cache-from: type=gha,scope=docker-build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-build-${{ matrix.arch }}

      - name: Smoke test Docker image
        run: |
          # Test CLI help
          docker run --rm ${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }} --help
          # Test library import
          docker run --rm --entrypoint python ${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }} -c "import pystormtracker as pst; print('Import success')"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
