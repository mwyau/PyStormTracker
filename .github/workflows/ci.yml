name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches:
      - main
      - release/**
    tags:
      - v*
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

jobs:
  ruff-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Lint with Ruff
        run: uv run ruff check .

  ruff-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Check formatting with Ruff
        run: uv run ruff format --check .

  mypy-typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev libeccodes-dev
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Type check with Mypy
        run: uv run mypy src/ tests/

  unit-tests:
    name: unit-tests (Python ${{ matrix.python-version }}/${{ matrix.arch }}${{ matrix.min-deps && ', min-deps' || '' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-24.04
            python-version: "3.11"
          - arch: amd64
            os: ubuntu-24.04
            python-version: "3.11"
            min-deps: true
          - arch: amd64
            os: ubuntu-24.04
            python-version: "3.14"
          - arch: arm64
            os: ubuntu-24.04-arm
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev libeccodes-dev
      - name: Install dependencies
        if: ${{ !matrix.min-deps }}
        run: uv sync --frozen --group dev
      - name: Install dependencies (min-deps)
        if: ${{ matrix.min-deps }}
        run: uv sync --group dev --resolution lowest-direct
      - name: Run Unit Tests
        run: |
          uv run pytest -vv

  integration-tests:
    name: integration-tests (Python ${{ matrix.python-version }}/${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-24.04
            python-version: "3.14"
          - arch: arm64
            os: ubuntu-24.04-arm
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev libeccodes-dev
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run Integration Tests
        run: |
          uv run pytest -vv tests/test_integration.py --run-integration
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
