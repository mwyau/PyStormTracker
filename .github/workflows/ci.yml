name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  push:
    branches:
      - main
      - release/**
    tags:
      - v*
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

jobs:
  ruff-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Lint with Ruff
        run: uv run ruff check .

  ruff-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Check formatting with Ruff
        run: uv run ruff format --check .

  mypy-typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Type check with Mypy
        run: uv run mypy src/ tests/

  unit-tests:
    name: unit-tests (Python ${{ matrix.python-version }}${{ matrix.min-deps && ', min-deps' || '' }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        min-deps: [false]
        include:
          - python-version: "3.11"
            min-deps: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev
      - name: Install dependencies
        if: ${{ !matrix.min-deps }}
        run: uv sync --frozen --group dev
      - name: Install dependencies (min-deps)
        if: ${{ matrix.min-deps }}
        run: uv sync --group dev --resolution lowest-direct
      - name: Run Unit Tests
        if: matrix.python-version != '3.14' || matrix.min-deps
        run: uv run pytest -vv

      - name: Run Unit Tests with Coverage
        if: matrix.python-version == '3.14' && !matrix.min-deps
        run: uv run pytest -vv --cov=pystormtracker --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.14' && !matrix.min-deps
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: integration-tests (Python ${{ matrix.python-version }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-24.04
            python-version: "3.14"
          - arch: arm64
            os: ubuntu-24.04-arm
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y openmpi-bin libopenmpi-dev
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run Integration Tests
        if: matrix.arch != 'amd64'
        run: uv run pytest -vv tests/test_integration.py --run-integration

      - name: Run Integration Tests with Coverage
        if: matrix.arch == 'amd64'
        run: uv run pytest -vv --cov=pystormtracker --cov-report=term-missing --cov-report=xml tests/test_integration.py --run-integration

      - name: Upload coverage reports to Codecov
        if: matrix.arch == 'amd64'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    name: docker-build
    needs: [integration-tests]
    if: |
      github.event_name != 'pull_request' &&
      (startsWith(github.ref, 'refs/heads/main') ||
       startsWith(github.ref, 'refs/heads/release/') ||
       startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and load Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: "${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }}"
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,mode=max,scope=docker-build

      - name: Smoke test Docker image
        run: |
          docker run --rm ${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }} --help

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  docker-publish:
    name: docker-publish
    needs: [docker-build]
    if: |
      github.event_name != 'pull_request' &&
      (startsWith(github.ref, 'refs/heads/main') ||
       startsWith(github.ref, 'refs/heads/release/') ||
       startsWith(github.ref, 'refs/tags/v'))
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit

  pypi-publish:
    name: pypi-publish
    needs: [integration-tests]
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/python-publish.yml
    secrets: inherit
