name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Ruff
        run: ruff format --check .

      - name: Type check with Mypy
        run: mypy src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run tests
        run: |
          # Run core tests always
          pytest tests/test_center.py tests/test_simple_detector.py tests/test_simple_linker.py tests/test_tracks.py
          
          # Run fast integration tests always
          pytest tests/test_integration.py -k n120
          
          # Run full integration and legacy regression only on dev/main branches
          if [[ "${{ github.base_ref }}" == "dev" || "${{ github.base_ref }}" == "main" || "${{ github.ref_name }}" == "dev" || "${{ github.ref_name }}" == "main" ]]; then
            pytest tests/test_integration.py -k "full or legacy"
          else
            echo "Skipping full integration and legacy regression tests on feature branch."
          fi
