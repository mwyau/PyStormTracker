name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.versions.outputs.value }}
    steps:
      - id: versions
        run: echo 'value=["3.11", "3.12", "3.13", "3.14"]' >> $GITHUB_OUTPUT

  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Lint with Ruff
        run: uv run ruff check .

  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Check formatting with Ruff
        run: uv run ruff format --check .

  mypy-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev
      - name: Install dependencies
        run: uv sync --group dev
      - name: Type check with Mypy
        run: uv run mypy src/ tests/

  unit-tests:
    name: unit-tests (Python ${{ matrix.python-version }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.prepare.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run Unit Tests
        run: |
          uv run pytest -vv

  integration-tests:
    name: integration-tests (Python ${{ matrix.python-version }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.prepare.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev libeccodes-dev
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run Integration Tests
        run: |
          uv run pytest -vv tests/test_integration.py --run-integration
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
