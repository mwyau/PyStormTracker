<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Storm Tracks</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; padding: 10px; color: #333; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        .control-group { display: flex; flex-direction: column; }
        .control-group label { font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        .slider-values { display: flex; justify-content: space-between; font-size: 0.8em; color: #666; margin-top: 2px; }
        #plot { width: 100%; height: 750px; border: 1px solid #eee; border-radius: 8px; }
        
        select { width: 100%; cursor: pointer; padding: 4px; border-radius: 4px; border: 1px solid #ccc; background: #fff; height: auto; }
        
        input[type="range"] { width: 100%; cursor: pointer; -webkit-appearance: none; background: #ddd; height: 6px; border-radius: 3px; outline: none; margin: 10px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #007bff; border-radius: 50%; cursor: pointer; border: 1px solid #0056b3; position: relative; z-index: 2; }
        
        .range-slider { position: relative; width: 100%; height: 20px; display: flex; align-items: center; }
        .range-slider input[type="range"] { position: absolute; left: 0; margin: 0; pointer-events: none; background: none; top: 50%; transform: translateY(-50%); }
        .range-slider input[type="range"]::-webkit-slider-thumb { pointer-events: auto; }
        .range-slider .slider-track { position: absolute; height: 6px; width: 100%; background: #ddd; border-radius: 3px; top: 50%; transform: translateY(-50%); z-index: 0; }
        
        .title-bar { margin-bottom: 10px; border-left: 4px solid #007bff; padding-left: 10px; }
        .title-bar h2 { margin: 0; font-size: 1.2em; }
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.8); padding: 20px; border-radius: 10px; z-index: 100; font-weight: bold; }
        .btn { padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; }
        .btn:hover:not(:disabled) { background: #e9ecef; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="loading" class="loading">Loading track data...</div>

<div class="title-bar">
    <h2>Storm Track Explorer</h2>
    <div id="status" style="font-size: 0.85em; color: #666;">Initializing...</div>
</div>

<script src="tracks_data.js"></script>

<div class="controls">
    <div class="control-group">
        <label>Map Projection</label>
        <select id="projection">
            <option value="orthographic">Globe (3D)</option>
            <option value="equirectangular">Global (Lat/Lon)</option>
        </select>
    </div>
    <div class="control-group">
        <label>Time Range</label>
        <div class="range-slider">
            <div class="slider-track" id="time-track"></div>
            <input type="range" id="time-start" step="21600000">
            <input type="range" id="time-end" step="21600000">
        </div>
        <div class="slider-values">
            <span id="time-start-val">...</span>
            <span id="time-end-val">...</span>
        </div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <button id="btn-play" class="btn" style="flex:1;">Play</button>
            <button id="btn-stop" class="btn" style="flex:1;" disabled>Stop</button>
            <button id="btn-reset" class="btn" style="flex:1;">Reset</button>
        </div>
    </div>
    <div class="control-group">
        <label id="strength-label">Peak Strength</label>
        <input type="range" id="strength">
        <div class="slider-values">
            <span id="strength-min-val">...</span>
            <span id="strength-val">...</span>
            <span id="strength-max-val">...</span>
        </div>
    </div>
    <div class="control-group">
        <label>Min Duration (hours)</label>
        <input type="range" id="duration" step="6">
        <div class="slider-values">
            <span>0h</span>
            <span id="duration-val">42h</span>
            <span id="duration-max-val">...</span>
        </div>
    </div>
    <div class="control-group">
        <label>Min Displacement (km)</label>
        <input type="range" id="displacement" step="100">
        <div class="slider-values">
            <span id="displacement-min-val">100km</span>
            <span id="displacement-val">...</span>
            <span id="displacement-max-val">...</span>
        </div>
    </div>
</div>

<div id="plot"></div>

<script>
let allData = null;
let isPlaying = false;
let animInterval = null;
let currentAnimTime = null;
let isUpdating = false;

const elements = {
    projection: document.getElementById('projection'),
    timeStart: document.getElementById('time-start'),
    timeEnd: document.getElementById('time-end'),
    timeTrack: document.getElementById('time-track'),
    timeStartVal: document.getElementById('time-start-val'),
    timeEndVal: document.getElementById('time-end-val'),
    btnPlay: document.getElementById('btn-play'),
    btnStop: document.getElementById('btn-stop'),
    btnReset: document.getElementById('btn-reset'),
    strength: document.getElementById('strength'),
    strengthLabel: document.getElementById('strength-label'),
    strengthVal: document.getElementById('strength-val'),
    strengthMinVal: document.getElementById('strength-min-val'),
    strengthMaxVal: document.getElementById('strength-max-val'),
    duration: document.getElementById('duration'),
    durationVal: document.getElementById('duration-val'),
    durationMaxVal: document.getElementById('duration-max-val'),
    displacement: document.getElementById('displacement'),
    displacementVal: document.getElementById('displacement-val'),
    displacementMinVal: document.getElementById('displacement-min-val'),
    displacementMaxVal: document.getElementById('displacement-max-val'),
    status: document.getElementById('status'),
    loading: document.getElementById('loading')
};

async function init() {
    if (window.TRACKS_DATA) {
        allData = window.TRACKS_DATA;
        setupControls();
        elements.loading.style.display = 'none';
        elements.btnPlay.addEventListener('click', playAnimation);
        elements.btnStop.addEventListener('click', stopAnimation);
        elements.btnReset.addEventListener('click', resetAnimation);
        updatePlot();
    } else {
        elements.status.innerHTML = `<b style='color:red'>Error:</b> Data script not found.`;
        elements.loading.style.display = 'none';
    }
}

function updateSliderFill() {
    [elements.strength, elements.duration, elements.displacement].forEach(el => {
        const val = (el.value - el.min) / (el.max - el.min) * 100;
        el.style.background = `linear-gradient(to right, #007bff ${val}%, #ddd ${val}%)`;
    });
    const min = parseInt(elements.timeStart.min);
    const max = parseInt(elements.timeStart.max);
    const v1 = parseInt(elements.timeStart.value);
    const v2 = parseInt(elements.timeEnd.value);
    const p1 = ((v1 - min) / (max - min)) * 100;
    const p2 = ((v2 - min) / (max - min)) * 100;
    elements.timeTrack.style.background = `linear-gradient(to right, #ddd ${p1}%, #007bff ${p1}%, #007bff ${p2}%, #ddd ${p2}%)`;
}

function setupControls() {
    const meta = allData.metadata;
    const isMSL = meta.track_type === 'msl';
    elements.timeStart.min = meta.min_time;
    elements.timeStart.max = meta.max_time;
    elements.timeStart.value = meta.min_time;
    elements.timeEnd.min = meta.min_time;
    elements.timeEnd.max = meta.max_time;
    elements.timeEnd.value = meta.max_time;
    elements.timeStart.addEventListener('input', () => {
        if (parseInt(elements.timeStart.value) >= parseInt(elements.timeEnd.value)) {
            elements.timeStart.value = parseInt(elements.timeEnd.value) - 21600000;
        }
    });
    elements.timeEnd.addEventListener('input', () => {
        if (parseInt(elements.timeEnd.value) <= parseInt(elements.timeStart.value)) {
            elements.timeEnd.value = parseInt(elements.timeStart.value) + 21600000;
        }
    });
    elements.strengthLabel.innerText = isMSL ? "Peak MSL (hPa)" : "Peak VO (10⁻⁵ s⁻¹)";
    elements.strength.min = Math.floor(meta.min_strength);
    elements.strength.max = Math.ceil(meta.max_strength);
    elements.strength.step = isMSL ? 1 : 0.1;
    elements.strength.value = isMSL ? -15 : Math.floor(meta.min_strength);
    elements.strengthMinVal.innerText = elements.strength.min;
    elements.strengthMaxVal.innerText = elements.strength.max;
    elements.duration.min = 0;
    elements.duration.max = Math.ceil(meta.max_duration);
    elements.duration.value = 48;
    elements.durationMaxVal.innerText = elements.duration.max + "h";
    const roundedMaxDisp = Math.ceil(meta.max_displacement / 100) * 100;
    elements.displacement.min = 100;
    elements.displacement.max = roundedMaxDisp;
    elements.displacement.value = Math.min(1000, roundedMaxDisp);
    elements.displacementMaxVal.innerText = roundedMaxDisp + "km";
    [elements.projection, elements.timeStart, elements.timeEnd, elements.strength, elements.duration, elements.displacement].forEach(el => {
        el.addEventListener('input', () => {
            if (isPlaying) stopAnimation();
            updateSliderFill();
            updatePlot();
        });
    });
    updateSliderFill();
}

function playAnimation() {
    if (isPlaying) return;
    isPlaying = true;
    elements.btnPlay.disabled = true;
    elements.btnStop.disabled = false;
    const tStart = parseInt(elements.timeStart.value);
    const tEnd = parseInt(elements.timeEnd.value);
    if (currentAnimTime === null || currentAnimTime >= tEnd) currentAnimTime = tStart;
    
    animInterval = setInterval(() => {
        let nextTime = currentAnimTime + 21600000;
        if (nextTime >= tEnd) {
            currentAnimTime = tEnd;
            updatePlot();
            stopAnimation();
            return;
        }
        currentAnimTime = nextTime;
        updatePlot();
    }, 41); // 24 fps
    updatePlot();
}

function stopAnimation() {
    isPlaying = false;
    elements.btnPlay.disabled = false;
    elements.btnStop.disabled = true;
    if (animInterval) { clearInterval(animInterval); animInterval = null; }
    updatePlot();
}

function resetAnimation() { stopAnimation(); currentAnimTime = null; updatePlot(); }

function getColor(val, isMSL, meta) {
    const turboScale = [[0.0, [48, 18, 59]], [0.1, [70, 74, 164]], [0.2, [61, 126, 237]], [0.3, [33, 176, 213]], [0.4, [24, 215, 160]], [0.5, [100, 240, 91]], [0.6, [178, 230, 54]], [0.7, [238, 182, 48]], [0.8, [254, 112, 28]], [0.9, [226, 45, 6]], [1.0, [158, 1, 1]]];
    const cmin = isMSL ? -60 : 0;
    const cmax = isMSL ? 0 : Math.max(10, meta.max_strength);
    let t = Math.min(1, Math.max(0, (val - cmin) / (cmax - cmin)));
    const tc = isMSL ? (1 - t) : t;
    for (let i = 0; i < turboScale.length - 1; i++) {
        if (tc >= turboScale[i][0] && tc <= turboScale[i+1][0]) {
            const ratio = (tc - turboScale[i][0]) / (turboScale[i+1][0] - turboScale[i][0]);
            const r = Math.round(turboScale[i][1][0] + (turboScale[i+1][1][0] - turboScale[i][1][0]) * ratio);
            const g = Math.round(turboScale[i][1][1] + (turboScale[i+1][1][1] - turboScale[i][1][1]) * ratio);
            const b = Math.round(turboScale[i][1][2] + (turboScale[i+1][1][2] - turboScale[i][1][2]) * ratio);
            return `rgb(${r}, ${g}, ${b})`;
        }
    }
    return `rgb(0,0,0)`;
}

function updatePlot() {
    if (isUpdating) return;
    isUpdating = true;
    
    const meta = allData.metadata;
    const isMSL = meta.track_type === 'msl';
    const unit = isMSL ? "hPa" : "10⁻⁵ s⁻¹";
    const tStart = parseInt(elements.timeStart.value);
    const tEnd = parseInt(elements.timeEnd.value);
    const strengthThresh = parseFloat(elements.strength.value);
    const minDur = parseFloat(elements.duration.value);
    const minDist = parseFloat(elements.displacement.value);
    const proj = elements.projection.value;

    elements.timeStartVal.innerText = new Date(tStart).toISOString().slice(0, 16).replace('T', ' ');
    elements.timeEndVal.innerText = new Date(tEnd).toISOString().slice(0, 16).replace('T', ' ');
    elements.strengthVal.innerText = strengthThresh + " " + unit;
    elements.durationVal.innerText = minDur + "h";
    elements.displacementVal.innerText = minDist + "km";

    const filtered = allData.tracks.filter(t => {
        const sMatch = isMSL ? t.strength <= strengthThresh : t.strength >= strengthThresh;
        return sMatch && t.duration >= minDur && t.displacement >= minDist;
    });

    const traces = [{ type: 'scattergeo', lat: [0], lon: [0], marker: { size: 0, opacity: 0 }, showlegend: false, hoverinfo: 'none' }];
    const curLats = [], curLons = [], curTexts = [], curColors = [];

    filtered.forEach(t => {
        let lats = [], lons = [], lastLat = null, lastLon = null;
        const color = getColor(t.strength, isMSL, meta);
        const startTimeStr = new Date(t.times[0]).toISOString().slice(0, 16).replace('T', ' ');
        const endTimeStr = new Date(t.times[t.times.length-1]).toISOString().slice(0, 16).replace('T', ' ');
        const hoverText = `ID: ${t.id}<br>Peak: ${t.strength.toFixed(1)} ${unit}<br>Dur: ${t.duration}h<br>Start: ${startTimeStr}<br>End: ${endTimeStr}`;

        for(let i=0; i<t.times.length; i++) {
            if (t.times[i] >= tStart && t.times[i] <= tEnd) {
                if (currentAnimTime !== null && t.times[i] > currentAnimTime) break;
                lats.push(t.lats[i]); lons.push(t.lons[i]);
                lastLat = t.lats[i]; lastLon = t.lons[i];
            }
        }
        if (lats.length > 1) {
            traces.push({ type: 'scattergeo', mode: 'lines', lat: lats, lon: lons, line: { color: color, width: 1.5 }, hoverinfo: 'text', text: hoverText, showlegend: false });
        }
        if (currentAnimTime !== null && t.times[0] <= currentAnimTime && t.times[t.times.length-1] >= currentAnimTime && lastLat !== null) {
            curLats.push(lastLat); curLons.push(lastLon); curTexts.push(hoverText); curColors.push(color);
        }
    });

    if (curLats.length > 0) {
        traces.push({ type: 'scattergeo', mode: 'markers', lat: curLats, lon: curLons, marker: { size: 10, color: curColors, line: { width: 1.5, color: '#333' } }, hoverinfo: 'text', text: curTexts, showlegend: false });
    }

    elements.status.innerText = (isPlaying || currentAnimTime !== null) ? `Animating: ${new Date(currentAnimTime).toISOString().slice(0, 16).replace('T', ' ')}` : `Showing ${filtered.length} tracks`;

    Plotly.react('plot', traces, {
        margin: { l: 20, r: 20, t: 20, b: 20 }, height: 750,
        geo: { showcoastlines: true, coastlinecolor: "#444", showland: true, landcolor: "#eee", showocean: true, oceancolor: "#fff", projection: { type: proj, rotation: proj === 'orthographic' ? { lon: -60, lat: 40 } : undefined } },
        uirevision: proj + '_' + tStart + '_' + tEnd + '_' + strengthThresh + '_' + minDur + '_' + minDist
    }, {responsive: true, displayModeBar: false}).then(() => {
        isUpdating = false;
    });
}

init();
</script>
</body>
</html>
